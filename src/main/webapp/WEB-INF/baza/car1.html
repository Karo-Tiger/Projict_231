<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gai</title>
</head>
<body>
<p th:text="${users.model}">VALUE</p>
<p th:text="${users.color}">VALUE</p>
<p th:text="${users.year}">VALUE</p>
<p th:text="${users.price}">VALUE</p>


<a th:href="@{/gai/edit(id=${users.id})}">Edit</a>


<form th:method="POST" th:action="@{/gai/delete}">
    <input type="hidden" name="id" th:value="${users.id}" />
    <input type="submit" value="Delete"/>
</form>
</body>
</html>
